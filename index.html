<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HighPix - AI Image Enhancer & Background Remover</title>
    <meta name="description" content="高画質化と背景透明化を瞬時に行うプレミアムツール。プライバシーを重視し、ブラウザ上で完結。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
    <div class="background-overlay"></div>
    <div class="app-container">
        <header>
            <div class="logo">
                <i data-lucide="sparkles" class="logo-icon"></i>
                <h1>High<span>Pix</span></h1>
            </div>
            <p class="tagline">Ultra Premium Image Processing Studio</p>
        </header>

        <main>
            <div class="processing-area" id="dropzone">
                <input type="file" id="fileInput" accept="image/*" hidden>
                
                <div class="upload-empty-state" id="emptyState">
                    <div class="upload-icon-wrapper">
                        <i data-lucide="upload-cloud" class="upload-icon"></i>
                    </div>
                    <h2>画像をアップロード</h2>
                    <p>画像をドラッグ＆ドロップ、またはクリックして選択</p>
                    <button class="primary-btn" id="selectBtn">ファイルを選択</button>
                    <p class="hint">著作権保護済み・商用利用可能な自分専用ツール</p>
                </div>

                <div class="preview-state hidden" id="previewState">
                    <div class="image-previews">
                        <div class="preview-box">
                            <span class="label">Original</span>
                            <img id="originalPreview" src="" alt="Original">
                        </div>
                        <div class="preview-box result-box">
                            <span class="label" id="resultLabel">Processing...</span>
                            <div class="processing-loader hidden" id="loader">
                                <div class="spinner"></div>
                                <p id="progressText">0%</p>
                            </div>
                            <img id="resultPreview" src="" alt="Result" class="hidden">
                        </div>
                    </div>
                </div>
            </div>

            <div class="controls-panel hidden" id="controls">
                <div class="menu-options">
                    <button class="menu-btn" data-mode="upscale">
                        <i data-lucide="maximize-2"></i>
                        <div class="btn-text">
                            <span class="title">高画質化</span>
                            <span class="desc">解像度を2倍に</span>
                        </div>
                    </button>
                    <button class="menu-btn" data-mode="remove-bg">
                        <i data-lucide="user-minus"></i>
                        <div class="btn-text">
                            <span class="title">背景透明化</span>
                            <span class="desc">不要な背景を除去</span>
                        </div>
                    </button>
                    <button class="menu-btn primary-gradient" data-mode="both">
                        <i data-lucide="zap"></i>
                        <div class="btn-text">
                            <span class="title">究極仕上げ</span>
                            <span class="desc">高画質化 ＋ 背景透明化</span>
                        </div>
                    </button>
                </div>
                
                <div class="action-footer hidden" id="actionFooter">
                    <button class="secondary-btn" id="resetBtn">
                        <i data-lucide="rotate-ccw"></i> 最初から
                    </button>
                    <button class="primary-btn" id="downloadBtn" disabled>
                        <i data-lucide="download"></i> ダウンロード (.png)
                    </button>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 HighPix Studio - Personal Edition</p>
        </footer>
    </div>

    <!-- Scripts -->
    <!-- TensorFlow JS Core -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <!-- Upscaler.js -->
    <script src="https://cdn.jsdelivr.net/npm/upscaler@1.0.0-beta.33/dist/browser/umd/upscaler.min.js"></script>
    <!-- Background Removal -->
    <script src="https://cdn.jsdelivr.net/npm/@imgly/background-removal@1.4.5/dist/index.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
